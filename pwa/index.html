<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fosfovita</title>
<meta name="theme-color" content="#c41500">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Fosfovita">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: linear-gradient(160deg, #ff6535 0%, #c41500 100%);
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    font-family: sans-serif; color: white; text-align: center; padding: 32px;
  }
  img { width: 90px; height: 90px; border-radius: 22px; margin-bottom: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
  h1 { font-size: 26px; font-weight: 700; margin-bottom: 6px; }
  p { font-size: 14px; color: rgba(255,255,255,0.75); margin-bottom: 36px; }
  a.btn {
    display: inline-block;
    background: white; color: #c41500;
    font-size: 16px; font-weight: 700;
    padding: 14px 32px; border-radius: 50px;
    text-decoration: none; letter-spacing: 0.3px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.25);
  }
  .hint { margin-top: 28px; font-size: 12px; color: rgba(255,255,255,0.5); }
</style>
<script>
  if (window.matchMedia('(display-mode: standalone)').matches) {
    window.location.replace('https://t.me/FosfovitaBot');
  }
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
</script>
</head>
<body>
  <img src="icon-192.png" alt="Fosfovita">
  <h1>Fosfovita Bot</h1>
  <p>Recordatorios inteligentes por Telegram</p>
  <a class="btn" href="https://t.me/FosfovitaBot">Abrir en Telegram</a>
  <div class="hint">Instalá esta página para acceso rápido</div>
</body>
</html>
