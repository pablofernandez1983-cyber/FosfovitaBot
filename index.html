<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FosfovitaBot</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg:       var(--tg-theme-bg-color, #f5f5f5);
      --bg2:      var(--tg-theme-secondary-bg-color, #ffffff);
      --text:     var(--tg-theme-text-color, #1a1a1a);
      --hint:     var(--tg-theme-hint-color, #888);
      --accent:   var(--tg-theme-button-color, #e8523a);
      --btn-text: var(--tg-theme-button-text-color, #ffffff);
      --border:   rgba(0,0,0,0.07);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 15px;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      background: linear-gradient(135deg, #e8523a 0%, #f5a623 100%);
      padding: 18px 16px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 10;
      box-shadow: 0 2px 12px rgba(232,82,58,0.25);
    }

    .header-logo {
      width: 48px; height: 48px;
      border-radius: 12px;
      object-fit: cover;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      flex-shrink: 0;
    }

    .header-info { flex: 1; }
    .header-info h1 { font-size: 18px; font-weight: 700; color: #fff; line-height: 1.1; }
    .header-info p  { font-size: 11px; color: rgba(255,255,255,0.8); margin-top: 2px; }

    #refresh-btn {
      background: rgba(255,255,255,0.2);
      border: none; border-radius: 10px; cursor: pointer;
      color: #fff; font-size: 18px;
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: background 0.15s;
    }
    #refresh-btn:active { background: rgba(255,255,255,0.35); }

    /* ── CONTENIDO ── */
    #main { padding: 14px 12px 24px; }

    /* ── ESTADOS ── */
    .state {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 60px 24px; gap: 14px; text-align: center;
    }
    .state-logo { width: 80px; height: 80px; border-radius: 20px; object-fit: cover; box-shadow: 0 4px 16px rgba(232,82,58,0.2); }
    .state h2   { font-size: 16px; font-weight: 600; color: var(--text); }
    .state p    { font-size: 13px; color: var(--hint); line-height: 1.5; }

    /* ── SECTION LABEL ── */
    .section-label {
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.07em;
      color: var(--hint); padding: 14px 4px 6px;
    }

    /* ── CARDS ── */
    #list { display: flex; flex-direction: column; gap: 8px; }

    .card {
      background: var(--bg2);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      animation: slideIn 0.18s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-main {
      padding: 13px 14px;
      display: flex; align-items: flex-start; gap: 11px;
    }

    .card-bell {
      width: 38px; height: 38px; border-radius: 10px;
      background: linear-gradient(135deg, #e8523a, #f5a623);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }

    .card-info { flex: 1; min-width: 0; }

    .card-time {
      font-size: 11px; font-weight: 700;
      margin-bottom: 4px; text-transform: capitalize; letter-spacing: 0.01em;
    }
    .card-time.soon  { color: #e8523a; }
    .card-time.today { color: #d4870a; }
    .card-time.ok    { color: #2a9d4e; }

    .card-text { font-size: 14px; line-height: 1.4; word-break: break-word; color: var(--text); }

    .card-actions { display: flex; flex-direction: column; gap: 6px; flex-shrink: 0; }

    .btn-action {
      border: none; border-radius: 10px; cursor: pointer;
      font-size: 15px; width: 34px; height: 34px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 600; transition: opacity 0.15s, transform 0.1s;
    }
    .btn-action:active { opacity: 0.5; transform: scale(0.92); }

    .btn-done { background: rgba(42,157,78,0.13);  color: #2a9d4e; }
    .btn-del  { background: rgba(232,82,58,0.12);  color: #e8523a; }
    .btn-edit { background: rgba(100,100,255,0.10); color: #5b6cf0; }

    /* ── EDIT FORM (inline, dentro de la card) ── */
    .edit-form {
      border-top: 1px solid var(--border);
      padding: 12px 14px;
      display: flex; flex-direction: column; gap: 8px;
    }

    .edit-form textarea {
      width: 100%; padding: 9px 10px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      background: var(--bg);
      color: var(--text);
      font-size: 14px; font-family: inherit;
      resize: vertical; min-height: 60px;
      outline: none; transition: border-color 0.15s;
    }
    .edit-form textarea:focus { border-color: #5b6cf0; }

    .edit-form input[type="datetime-local"] {
      width: 100%; padding: 9px 10px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      background: var(--bg);
      color: var(--text);
      font-size: 13px; font-family: inherit;
      outline: none; transition: border-color 0.15s;
    }
    .edit-form input[type="datetime-local"]:focus { border-color: #5b6cf0; }

    .edit-actions { display: flex; gap: 8px; }

    .btn-save, .btn-cancel {
      flex: 1; padding: 9px; border: none; border-radius: 10px;
      font-size: 14px; font-weight: 600; cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-save   { background: #5b6cf0; color: #fff; }
    .btn-cancel { background: rgba(0,0,0,0.07); color: var(--hint); }
    .btn-save:active, .btn-cancel:active { opacity: 0.6; }

    /* ── SPINNER ── */
    .spinner {
      width: 30px; height: 30px;
      border: 3px solid rgba(232,82,58,0.2);
      border-top-color: #e8523a;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── CONTADOR ── */
    #counter { text-align: center; font-size: 12px; color: var(--hint); margin-bottom: 2px; }
  </style>
</head>
<body>

<header>
  <img class="header-logo" src="logo.png" alt="FosfovitaBot" />
  <div class="header-info">
    <h1>FosfovitaBot</h1>
    <p>Tus recordatorios pendientes</p>
  </div>
  <button id="refresh-btn" title="Actualizar">↻</button>
</header>

<div id="main">
  <div class="state"><div class="spinner"></div></div>
</div>

<script>
// ── CONFIG ──
const SUPABASE_URL      = "https://zqwkznlgbkofsrygqezk.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpxd2t6bmxnYmtvZnNyeWdxZXprIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1MTAzMTAsImV4cCI6MjA5MTA4NjMxMH0.GNt-G_RUcxLYCpSqAKKI4KxNU87bBEQAJVCr88R2wQE";

// ── Telegram WebApp ──
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();
const tgUser = tg.initDataUnsafe?.user;
const CHAT_ID = tgUser?.id ?? null;

// ── Supabase REST ──
const HEADERS = {
  "apikey":        SUPABASE_ANON_KEY,
  "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
  "Content-Type":  "application/json",
};

async function fetchReminders() {
  const url = `${SUPABASE_URL}/rest/v1/recordatorios?chat_id=eq.${CHAT_ID}&enviado=eq.false&order=scheduled_at.asc&select=*`;
  const res = await fetch(url, { headers: HEADERS });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

async function deleteReminder(jobId) {
  const url = `${SUPABASE_URL}/rest/v1/recordatorios?job_id=eq.${encodeURIComponent(jobId)}&chat_id=eq.${CHAT_ID}`;
  const res = await fetch(url, { method: "DELETE", headers: HEADERS });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
}

async function markDone(jobId) {
  const url = `${SUPABASE_URL}/rest/v1/recordatorios?job_id=eq.${encodeURIComponent(jobId)}&chat_id=eq.${CHAT_ID}`;
  const res = await fetch(url, { method: "PATCH", headers: HEADERS, body: JSON.stringify({ enviado: true }) });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
}

async function updateReminder(jobId, texto, scheduledAt) {
  const url = `${SUPABASE_URL}/rest/v1/recordatorios?job_id=eq.${encodeURIComponent(jobId)}&chat_id=eq.${CHAT_ID}`;
  const res = await fetch(url, {
    method: "PATCH", headers: HEADERS,
    body: JSON.stringify({ texto, scheduled_at: scheduledAt }),
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
}

// ── Fecha ──
const DIAS  = ["domingo","lunes","martes","miércoles","jueves","viernes","sábado"];
const MESES = ["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];

function formatDate(isoStr) {
  const now  = new Date();
  const date = new Date(isoStr);
  const diff = (date - now) / 1000;
  const hh   = date.getHours().toString().padStart(2,"0");
  const mm   = date.getMinutes().toString().padStart(2,"0");
  const hora = `${hh}:${mm}`;
  const año  = date.getFullYear();

  const esMismodia = date.toDateString() === now.toDateString();
  const manana = new Date(now); manana.setDate(manana.getDate()+1);
  const esMañana = date.toDateString() === manana.toDateString();

  let label, cls;
  if (diff < 0) {
    label = `venció · ${hora} · ${date.getDate()} ${MESES[date.getMonth()]} ${año}`;
    cls = "soon";
  } else if (diff < 3600) {
    label = `en ${Math.round(diff/60)} min · ${hora} · ${date.getDate()} ${MESES[date.getMonth()]} ${año}`;
    cls = "soon";
  } else if (esMismodia) {
    label = `hoy · ${hora} · ${date.getDate()} ${MESES[date.getMonth()]} ${año}`;
    cls = "today";
  } else if (esMañana) {
    label = `mañana · ${hora} · ${date.getDate()} ${MESES[date.getMonth()]} ${año}`;
    cls = "ok";
  } else {
    const dia = DIAS[date.getDay()];
    const d   = date.getDate();
    const mes = MESES[date.getMonth()];
    label = `${dia} ${d} ${mes} ${año} · ${hora}`;
    cls   = "ok";
  }
  return { label, cls };
}

// Convierte ISO a valor de input datetime-local (YYYY-MM-DDTHH:MM) en hora local
function isoToLocalInput(isoStr) {
  const d = new Date(isoStr);
  const pad = n => n.toString().padStart(2,"0");
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

// Convierte valor de input datetime-local a ISO con offset local
function localInputToIso(val) {
  // val = "2026-04-15T10:30"
  const d = new Date(val); // interpreta en timezone local del browser
  return d.toISOString();
}

// ── Render ──
const main = document.getElementById("main");

function renderEmpty() {
  main.innerHTML = `
    <div class="state">
      <img class="state-logo" src="logo.png" alt="FosfovitaBot" />
      <h2>¡Todo al día! 🎉</h2>
      <p>No tenés recordatorios pendientes.<br>Escribile al bot para crear uno.</p>
    </div>`;
}

function renderError(msg) {
  main.innerHTML = `
    <div class="state">
      <img class="state-logo" src="logo.png" alt="FosfovitaBot" />
      <h2>Ups</h2><p>${msg}</p>
    </div>`;
}

function cardHtml(r) {
  const { label, cls } = formatDate(r.scheduled_at);
  const texto  = r.texto.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  const short  = r.job_id.substring(0,8);
  const dtVal  = isoToLocalInput(r.scheduled_at);
  return `
    <div class="card" id="card-${short}" data-jobid="${r.job_id}" data-scheduled="${r.scheduled_at}" data-texto="${r.texto.replace(/"/g,'&quot;')}">
      <div class="card-main">
        <div class="card-bell">🔔</div>
        <div class="card-info">
          <div class="card-time ${cls}">${label}</div>
          <div class="card-text">${texto}</div>
        </div>
        <div class="card-actions">
          <button class="btn-action btn-done" data-id="${r.job_id}" title="Listo">✓</button>
          <button class="btn-action btn-edit" data-id="${r.job_id}" title="Editar">✏️</button>
          <button class="btn-action btn-del"  data-id="${r.job_id}" title="Eliminar">✕</button>
        </div>
      </div>
      <div class="edit-form" id="edit-${short}" style="display:none">
        <textarea id="etxt-${short}">${r.texto}</textarea>
        <input type="datetime-local" id="edt-${short}" value="${dtVal}" />
        <div class="edit-actions">
          <button class="btn-cancel" data-short="${short}">Cancelar</button>
          <button class="btn-save"   data-short="${short}" data-id="${r.job_id}">Guardar</button>
        </div>
      </div>
    </div>`;
}

function removeCard(shortId) {
  const card = document.getElementById(`card-${shortId}`);
  if (!card) return;
  card.style.transition = "opacity 0.2s, transform 0.2s";
  card.style.opacity    = "0";
  card.style.transform  = "scale(0.95)";
  setTimeout(() => {
    card.remove();
    document.querySelectorAll(".section-label").forEach(lbl => {
      let next = lbl.nextElementSibling;
      while (next && next.classList.contains("section-label")) next = next.nextElementSibling;
      if (!next || !next.classList.contains("card")) lbl.remove();
    });
    if (!document.querySelectorAll(".card").length) renderEmpty();
    updateCounter();
  }, 200);
}

function updateCounter() {
  const n = document.querySelectorAll(".card").length;
  const c = document.getElementById("counter");
  if (c) c.textContent = n ? `${n} recordatorio${n!==1?"s":""} pendiente${n!==1?"s":""}` : "";
}

function refreshCard(shortId, newTexto, newScheduled) {
  const card = document.getElementById(`card-${shortId}`);
  if (!card) return;
  const { label, cls } = formatDate(newScheduled);
  card.querySelector(".card-time").className = `card-time ${cls}`;
  card.querySelector(".card-time").textContent = label;
  card.querySelector(".card-text").textContent = newTexto;
  card.dataset.scheduled = newScheduled;
  card.dataset.texto     = newTexto;
  // cerrar form
  document.getElementById(`edit-${shortId}`).style.display = "none";
}

function attachListeners() {
  // ── DONE ──
  document.querySelectorAll(".btn-done").forEach(btn => {
    btn.addEventListener("click", async () => {
      const jobId   = btn.getAttribute("data-id");
      const shortId = jobId.substring(0,8);
      btn.disabled  = true; btn.textContent = "…";
      try {
        await markDone(jobId);
        tg.HapticFeedback?.impactOccurred("light");
        removeCard(shortId);
      } catch(e) {
        btn.disabled = false; btn.textContent = "✓";
        tg.showAlert?.(`Error: ${e.message}`);
      }
    });
  });

  // ── DELETE ──
  document.querySelectorAll(".btn-del").forEach(btn => {
    btn.addEventListener("click", async () => {
      const jobId   = btn.getAttribute("data-id");
      const shortId = jobId.substring(0,8);
      btn.disabled  = true; btn.textContent = "…";
      try {
        await deleteReminder(jobId);
        tg.HapticFeedback?.impactOccurred("medium");
        removeCard(shortId);
      } catch(e) {
        btn.disabled = false; btn.textContent = "✕";
        tg.showAlert?.(`Error: ${e.message}`);
      }
    });
  });

  // ── EDIT toggle ──
  document.querySelectorAll(".btn-edit").forEach(btn => {
    btn.addEventListener("click", () => {
      const shortId  = btn.getAttribute("data-id").substring(0,8);
      const editForm = document.getElementById(`edit-${shortId}`);
      const isOpen   = editForm.style.display !== "none";
      // cerrar todos los otros forms
      document.querySelectorAll(".edit-form").forEach(f => f.style.display = "none");
      if (!isOpen) editForm.style.display = "block";
    });
  });

  // ── CANCEL ──
  document.querySelectorAll(".btn-cancel").forEach(btn => {
    btn.addEventListener("click", () => {
      const shortId = btn.getAttribute("data-short");
      document.getElementById(`edit-${shortId}`).style.display = "none";
    });
  });

  // ── SAVE ──
  document.querySelectorAll(".btn-save").forEach(btn => {
    btn.addEventListener("click", async () => {
      const shortId = btn.getAttribute("data-short");
      const jobId   = btn.getAttribute("data-id");
      const texto   = document.getElementById(`etxt-${shortId}`).value.trim();
      const dtVal   = document.getElementById(`edt-${shortId}`).value;

      if (!texto || !dtVal) { tg.showAlert?.("Completá el texto y la fecha."); return; }

      const scheduledIso = localInputToIso(dtVal);
      btn.disabled = true; btn.textContent = "…";
      try {
        await updateReminder(jobId, texto, scheduledIso);
        tg.HapticFeedback?.impactOccurred("light");
        refreshCard(shortId, texto, scheduledIso);
        btn.disabled = false; btn.textContent = "Guardar";
      } catch(e) {
        btn.disabled = false; btn.textContent = "Guardar";
        tg.showAlert?.(`Error: ${e.message}`);
      }
    });
  });
}

function renderList(reminders) {
  if (!reminders.length) { renderEmpty(); return; }

  const now      = new Date();
  const todayEnd = new Date(now); todayEnd.setHours(23,59,59,999);
  const hoy      = reminders.filter(r => new Date(r.scheduled_at) <= todayEnd);
  const proximos = reminders.filter(r => new Date(r.scheduled_at) >  todayEnd);
  const total    = reminders.length;

  let html = `<p id="counter">${total} recordatorio${total!==1?"s":""} pendiente${total!==1?"s":""}</p>`;
  html += '<div id="list">';
  if (hoy.length)      { html += '<div class="section-label">Hoy</div>';      hoy.forEach(r => { html += cardHtml(r); }); }
  if (proximos.length) { html += '<div class="section-label">Próximos</div>'; proximos.forEach(r => { html += cardHtml(r); }); }
  html += "</div>";

  main.innerHTML = html;
  attachListeners();
}

// ── Load ──
async function load() {
  main.innerHTML = '<div class="state"><div class="spinner"></div></div>';
  try {
    if (!CHAT_ID) { renderError("No se pudo identificar tu usuario.<br>Abrí esta página desde el bot."); return; }
    const data = await fetchReminders();
    renderList(data);
  } catch(e) {
    renderError(`No se pudo cargar.<br>${e.message}`);
  }
}

document.getElementById("refresh-btn").addEventListener("click", load);
load();
</script>
</body>
</html>
